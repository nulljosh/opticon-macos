name: Opticon
options:
  bundleIdPrefix: com.heyitsmejosh
  deploymentTarget:
    macOS: "14.0"
settings:
  DEVELOPMENT_TEAM: QMM486NPYC
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "0.1.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  Opticon:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - "*.xcodeproj"
          - "*.yml"
          - ".git"
          - ".gitignore"
          - "*.svg"
          - "*.md"
          - Tests
    settings:
      INFOPLIST_FILE: Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.opticon-macos
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_ENTITLEMENTS: Opticon.entitlements
  OpticonTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Opticon
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.opticon-macos.tests
      GENERATE_INFOPLIST_FILE: YES
